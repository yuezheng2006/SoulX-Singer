# 复制为 test_config.toml 后按需修改（test_config.toml 已加入 .gitignore）
# cp soulx_svc/test_config.example.toml soulx_svc/test_config.toml

[api]
host = "127.0.0.1"
port = 8088

# 音频路径：相对仓库根目录，或写绝对路径（可将测试文件放入 soulx_svc/audios/）
[audio]
prompt = "soulx_svc/audios/prompt.wav"
target = "soulx_svc/audios/target.mp3"

[output]
file = "outputs/soulx_svc_test_out.wav"

# 与 GET 查询参数一致，不设则使用下列默认
[svc_params]
prompt_vocal_sep = false
target_vocal_sep = true
auto_shift = true
auto_mix_acc = true
pitch_shift = 0
n_steps = 32
cfg = 1.0
seed = 42
