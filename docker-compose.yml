version: '3.8'

services:
  # SVC API 服务
  svc-api:
    build:
      context: ..
      dockerfile: soulx_svc/Dockerfile
    container_name: soulx-svc-api
    ports:
      - "8088:8088"
    environment:
      - SVC_CPU_THREADS=2
      - SVC_FP16=1
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      # 挂载模型目录（模型下载到此目录）
      - ./models:/app/models:ro
      # 挂载输出目录
      - ./outputs:/app/outputs
      # 挂载音频缓存
      - ./audios:/app/audios
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - svc-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: soulx-svc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - svc-api
    restart: unless-stopped
    networks:
      - svc-network

  # Redis 缓存 (可选，用于缓存参考音频特征)
  redis:
    image: redis:7-alpine
    container_name: soulx-svc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - svc-network
    command: redis-server --appendonly yes

networks:
  svc-network:
    driver: bridge

volumes:
  redis-data:
